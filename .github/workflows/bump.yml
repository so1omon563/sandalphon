name: Version Bump

on:
  pull_request:
    types: ["closed"]
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    if: |
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.title, '#patch') ||
        contains(github.event.pull_request.title, '#minor') ||
        contains(github.event.pull_request.title, '#major')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create semantic version tag
        uses: so1omon563/custom-semver-bumper@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          branch_name: ${{ github.event.pull_request.head.ref }}

      # GitHub Release and Stream Deck package publication are intentionally
      # deferred until Sandalphon's v0.1 release gate.
